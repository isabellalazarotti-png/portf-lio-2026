<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Trimestre | Isabella Tondim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --preto-fundo: #0a0a0a;
            --lilais-forte: #9B6DFF;
            --lilais-escuro: #7A4DFF;
            --branco-suave: #F4F4F4;
            --cinza-card: #151515;
            --fonte-destaque: 'Playfair Display', serif;
            --fonte-sans: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--fonte-sans); 
            background-color: var(--preto-fundo);
            color: var(--branco-suave);
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(155, 109, 255, 0.2);
        }

        .logo { font-family: var(--fonte-destaque); font-size: 1.5rem; text-decoration: none; color: var(--lilais-forte); font-style: italic; }
        nav { display: flex; gap: 35px; }
        nav a { text-decoration: none; color: var(--branco-suave); font-weight: 500; font-size: 0.9rem; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--lilais-forte); }

        .container-materias {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 120px 8% 50px;
        }

        .voltar {
            align-self: flex-start;
            text-decoration: none;
            color: var(--lilais-forte);
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .voltar:hover { opacity: 0.7; }

        h2 {
            font-family: var(--fonte-destaque);
            font-size: 3rem;
            font-style: italic;
            margin-bottom: 50px;
            text-align: center;
        }
        h2 span { color: var(--lilais-forte); }

        .grid-materias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card-materia {
            background: var(--cinza-card);
            padding: 40px 20px;
            border-radius: 20px;
            text-decoration: none;
            text-align: center;
            border: 1px solid rgba(155, 109, 255, 0.1);
            transition: 0.4s;
        }

        .card-materia h3 {
            color: var(--branco-suave);
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s;
        }

        .card-materia:hover {
            background: var(--lilais-forte);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(155, 109, 255, 0.2);
        }

        .card-materia:hover h3 { color: #000; }

        @media (max-width: 800px) {
            .container-materias { padding-top: 150px; }
            h2 { font-size: 2.3rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">ISABELLA TONDIM</a>
        <nav>
            <a href="index.html">Início</a>
            <a href="projetos.html">Trabalhos</a>
            <a href="sobre.html">Sobre mim</a>
            <a href="contato.html">Fale Conosco</a>
        </nav>
    </header>

    <main class="container-materias">
        <a href="projetos.html" class="voltar">← Voltar para Trimestres</a>
        
        <h2>Matérias do <span>1º Trimestre</span></h2>

        <div class="grid-materias">
            <a href="linguagens1.html" class="card-materia">
                <h3>Linguagens</h3>
            </a>

            <a href="humanas1.html" class="card-materia">
                <h3>Humanas</h3>
            </a>

            <a href="natureza1.html" class="card-materia">
                <h3>Natureza</h3>
            </a>

            <a href="matematica1.html" class="card-materia">
                <h3>Matemática</h3>
            </a>

            <a href="tecnico1.html" class="card-materia">
                <h3>Técnico</h3>
            </a>
        </div>
    </main>

</body>
</html>
