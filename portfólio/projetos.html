<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos | Isabella Tondim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --preto-fundo: #0a0a0a;
            --lilais-forte: #9B6DFF;
            --branco-suave: #F4F4F4;
            --cinza-card: #151515;
            --fonte-destaque: 'Playfair Display', serif;
            --fonte-sans: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--fonte-sans); 
            background-color: var(--preto-fundo);
            color: var(--branco-suave);
            overflow: hidden; /* Mantém a tela fixa e elegante */
        }

        /* --- NAVEGAÇÃO SUPERIOR --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(155, 109, 255, 0.2);
        }

        .logo { font-family: var(--fonte-destaque); font-size: 1.5rem; text-decoration: none; color: var(--lilais-forte); font-style: italic; }
        nav { display: flex; gap: 35px; }
        nav a { text-decoration: none; color: var(--branco-suave); font-weight: 500; font-size: 0.9rem; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--lilais-forte); }

        /* --- FAIXA LATERAL --- */
        .faixa-lateral {
            position: fixed;
            left: 0; top: 0; width: 60px; height: 100%;
            background-color: var(--lilais-forte);
            display: flex; align-items: center; justify-content: center;
            z-index: 500;
        }

        .texto-vertical {
            transform: rotate(-90deg);
            white-space: nowrap;
            font-size: 0.7rem;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 800;
        }

        /* --- CONTEÚDO DOS TRIMESTRES --- */
        .container-selecao {
            margin-left: 60px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 8%;
        }

        h2 {
            font-family: var(--fonte-destaque);
            font-size: 3.5rem;
            font-style: italic;
            color: var(--branco-suave);
            margin-bottom: 50px;
            text-align: center;
        }

        h2 span { color: var(--lilais-forte); }

        .menu-trimestres {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }

        .card-trimestre {
            background: var(--cinza-card);
            height: 300px;
            border-radius: 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(155, 109, 255, 0.1);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card-trimestre:hover {
            transform: translateY(-15px);
            border-color: var(--lilais-forte);
            box-shadow: 0 20px 40px rgba(155, 109, 255, 0.2);
            background: #1a1a1a;
        }

        .card-trimestre span {
            font-size: 1rem;
            color: var(--lilais-forte);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-trimestre h3 {
            font-family: var(--fonte-destaque);
            font-size: 2.2rem;
            color: var(--branco-suave);
            font-style: italic;
        }

        /* Efeito de brilho no hover */
        .card-trimestre::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(155,109,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: 0.5s;
        }

        .card-trimestre:hover::before {
            opacity: 1;
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .faixa-lateral { display: none; }
            .container-selecao { margin-left: 0; }
            .menu-trimestres { grid-template-columns: 1fr; gap: 20px; }
            .card-trimestre { height: 150px; }
            h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="faixa-lateral">
        <div class="texto-vertical">Selecione o trimeste desejado</div>
    </div>

   <header>
        <a href="index.html" class="logo">ISABELLA TONDIM</a>
        <nav>
            <a href="index.html" style="text-transform: uppercase; color: #fff; text-decoration: none; margin-right: 25px; font-size: 14px;">Início</a>
            <a href="projetos.html" style="text-transform: uppercase; color: #fff; text-decoration: none; margin-right: 25px; font-size: 14px;">Trabalhos</a>
            <a href="sobre.html" style="text-transform: uppercase; color: #fff; text-decoration: none; margin-right: 25px; font-size: 14px;">Sobre mim</a>
            
            <a href="jogo.html" style="text-transform: uppercase; color: #fff; text-decoration: none; margin-right: 25px; font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px;">🎮 Desafio</a>

            <a href="contato.html" style="
                text-transform: uppercase; 
                color: #fff !important; 
                text-decoration: none; 
                border: 2px solid #9B6DFF; 
                padding: 10px 25px; 
                border-radius: 50px; 
                font-weight: bold; 
                font-size: 14px;
                transition: 0.3s;
            " onmouseover="this.style.background='#9B6DFF'; this.style.color='#000 !important';" 
               onmouseout="this.style.background='transparent'; this.style.color='#fff !important';">
                Fale Comigo
            </a>
        </nav>
    </header>

    <main class="container-selecao">
        <h2>Meus <span>Trabalhos</span></h2>

        <div class="menu-trimestres">
            <a href="trimestre1.html" class="card-trimestre">
               
                <h3>1º Trimestre</h3>
            </a>

            <a href="trimestre2.html" class="card-trimestre">
               
                <h3>2º Trimestre</h3>
            </a>

            <a href="trimestre3.html" class="card-trimestre">
                
                <h3>3º Trimestre</h3>
            </a>
        </div>
    </main>

</body>
</html>
