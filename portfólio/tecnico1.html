<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Técnico | 1º Trimestre</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --preto-fundo: #0a0a0a;
            --lilais-forte: #9B6DFF;
            --branco-suave: #F4F4F4;
            --cinza-card: #151515;
            --fonte-destaque: 'Playfair Display', serif;
            --fonte-sans: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--fonte-sans); 
            background-color: var(--preto-fundo);
            color: var(--branco-suave);
            padding: 100px 8%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0; width: 100%; left: 0; z-index: 1000;
            border-bottom: 1px solid rgba(155, 109, 255, 0.2);
        }

        .logo { font-family: var(--fonte-destaque); font-size: 1.5rem; text-decoration: none; color: var(--lilais-forte); font-style: italic; }

        .voltar {
            display: inline-block;
            text-decoration: none;
            color: var(--lilais-forte);
            font-weight: 600;
            margin-bottom: 30px;
            margin-top: 50px;
        }

        h2 { font-family: var(--fonte-destaque); font-size: 3rem; font-style: italic; margin-bottom: 40px; }
        h2 span { color: var(--lilais-forte); }

        /* Grade para as matérias técnicas */
        .grid-materias-tecnicas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card-tecnico {
            background: var(--cinza-card);
            padding: 30px;
            border-radius: 15px;
            text-decoration: none;
            border: 1px solid rgba(155, 109, 255, 0.1);
            transition: 0.4s;
            text-align: center;
        }

        .card-tecnico:hover {
            border-color: var(--lilais-forte);
            transform: translateY(-5px);
            background: rgba(155, 109, 255, 0.05);
        }

        .card-tecnico h3 {
            color: var(--branco-suave);
            font-family: var(--fonte-destaque);
            font-size: 1.4rem;
        }

        .card-tecnico p {
            color: #888;
            font-size: 0.8rem;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">ISABELLA TONDIM</a>
    </header>

    <a href="trimestre1.html" class="voltar">← Voltar para Geral</a>
    
    <h2>Matérias <span>Técnico</span></h2>

    <div class="grid-materias-tecnicas">
        
        <a href="logica.html" class="card-tecnico">
            <h3>Lógica de Programação</h3>
            <p>Ver Projetos</p>
        </a>

        <a href="hardware.html" class="card-tecnico">
            <h3>Modelagem de sistemas</h3>
            <p>Ver Projetos</p>
        </a>

        <a href="banco-dados.html" class="card-tecnico">
            <h3>Banco de Dados</h3>
            <p>Ver Projetos</p>
        </a>

        </div>

</body>
</html>
