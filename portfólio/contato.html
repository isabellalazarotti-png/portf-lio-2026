<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Comigo | Isabella Tondim</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --preto-fundo: #0a0a0a;
            --lilais-forte: #9B6DFF;
            --lilais-escuro: #7A4DFF;
            --branco-suave: #F4F4F4;
            --cinza-card: #151515;
            --fonte-serifa: 'Cormorant Garamond', serif;
            --fonte-destaque: 'Playfair Display', serif;
            --fonte-sans: 'Inter', sans-serif;
        }

        body { 
            font-family: var(--fonte-sans); 
            background-color: var(--preto-fundo);
            color: var(--branco-suave);
            overflow-x: hidden;
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(155, 109, 255, 0.2);
        }

        .logo { font-family: var(--fonte-serifa); font-size: 1.5rem; font-weight: 600; text-decoration: none; color: var(--lilais-forte); letter-spacing: 1px; }
        nav { display: flex; align-items: center; gap: 35px; }
        nav a { text-decoration: none; color: var(--branco-suave); font-weight: 500; font-size: 0.9rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        nav a:hover { color: var(--lilais-forte); }
        .nav-ativo { color: var(--lilais-forte) !important; font-weight: 700; }

        .container-contato { 
            max-width: 650px; 
            margin: 150px auto 80px; 
            padding: 0 5%; 
        }

        h2 { 
            font-family: var(--fonte-destaque); 
            font-size: 3.5rem; 
            color: var(--lilais-forte); 
            font-style: italic; 
            text-align: center; 
            margin-bottom: 40px; 
        }

        .wrapper-contato { 
            background: var(--cinza-card); 
            padding: 50px; 
            border-radius: 40px; 
            border: 1px solid rgba(155, 109, 255, 0.2); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex; 
            flex-direction: column; 
            gap: 40px;
            backdrop-filter: blur(10px);
        }

        .form-contato { display: flex; flex-direction: column; gap: 20px; }

        .form-contato input, .form-contato textarea { 
            padding: 15px; 
            border: 1px solid rgba(155, 109, 255, 0.1); 
            border-radius: 15px; 
            background: #0a0a0a; 
            color: white;
            width: 100%; 
            font-family: inherit; 
            outline: none; 
            transition: 0.3s;
        }

        .form-contato input:focus, .form-contato textarea:focus {
            border-color: var(--lilais-forte);
            box-shadow: 0 0 10px rgba(155, 109, 255, 0.2);
        }

        .btn-enviar { 
            background: var(--lilais-forte); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 50px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(155, 109, 255, 0.3);
        }

        .btn-enviar:hover { 
            background: var(--lilais-escuro);
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(155, 109, 255, 0.4);
        }

        .instagram-secao { 
            text-align: center; 
            border-top: 1px solid rgba(155, 109, 255, 0.1); 
            padding-top: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            align-items: center; 
        }

        .card-insta { 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            padding: 12px 30px; 
            background: rgba(155, 109, 255, 0.1); 
            border-radius: 50px; 
            text-decoration: none; 
            color: var(--lilais-forte); 
            font-weight: 600; 
            border: 1px solid var(--lilais-forte); 
            transition: 0.3s;
        }

        .card-insta:hover {
            background: var(--lilais-forte);
            color: #000;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .wrapper-contato { padding: 30px; }
            h2 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">ISABELLA<br>TONDIM</a>
        <nav>
            <a href="index.html">Início</a>
            <a href="projetos.html">Trabalhos</a>
            <a href="sobre.html">Sobre mim</a>
            <a href="contato.html" class="nav-ativo">Fale comigo</a>
        </nav>
    </header>

    <main class="container-contato">
        <h2>Fale comigo</h2>
        <div class="wrapper-contato">
            <form action="https://formspree.io/f/xvzvegbn" method="POST" class="form-contato">
                <input type="text" name="nome" placeholder="Seu nome" required>
                <input type="email" name="email" placeholder="Seu e-mail" required>
                <textarea name="mensagem" rows="4" placeholder="Sua mensagem..." required></textarea>
                <button type="submit" class="btn-enviar">Enviar Mensagem ✨</button>
            </form>

            <div class="instagram-secao">
                <p style="color: #999;">Você támbem pode me encontrar  no:</p>
                <a href="https://www.instagram.com/isabella_tondim/?next=%2F" target="_blank" class="card-insta">
                    <span>📸</span> @isabella_tondim
                </a>
            </div>
        </div>
    </main>
</body>
</html>
